name: Build & Deploy Rocket Assets

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de deploy"
        type: choice
        options:
          - sandbox
          - production
        default: sandbox
      rocket_ref:
        description: "Branch/tag/commit do rocket para buildar"
        required: true
        default: master

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      OPEN_STORE_TEMPLATE_COMPONENTS_URL: ${{ vars.OPEN_STORE_TEMPLATE_COMPONENTS_URL }}

    steps:
      - name: Checkout yampi-templates
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Checkout rocket (fonte + toolchain)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: pedro-crv4/rocket
          ref: ${{ inputs.rocket_ref }}
          token: ${{ secrets.ROCKET_REPO_TOKEN }}
          path: .rocket-src
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 18
          cache: yarn
          cache-dependency-path: .rocket-src/yarn.lock

      - name: Install dependencies
        working-directory: .rocket-src
        run: yarn install --frozen-lockfile

      - name: Build componentes Vue
        working-directory: .rocket-src
        run: node build-vue-files.mjs --all

      - name: Build assets (CSS + vendor via build:ci)
        working-directory: .rocket-src
        run: yarn build:ci

      - name: Sincronizar saida em rocket-assets
        run: |
          rm -rf rocket-assets/components rocket-assets/css rocket-assets/dist/vendor
          mkdir -p rocket-assets/components rocket-assets/css rocket-assets/dist/vendor
          cp -R .rocket-src/.open-store/dist/components/. rocket-assets/components/
          cp -R .rocket-src/public/css/. rocket-assets/css/
          cp -R .rocket-src/.open-store/dist/vendor/. rocket-assets/dist/vendor/

      - name: Sincronizar fonte rocket/ a partir do .rocket-src (mesmo ref)
        run: |
          rsync -a --delete \
            --exclude='errors' \
            --exclude='assets' \
            --exclude='components' \
            --exclude='head.twig' \
            --exclude='preload.twig' \
            --exclude='yampi-internals' \
            .rocket-src/resources/twig/template/rocket/ rocket/
          rsync -a --delete --exclude='*.js' \
            .rocket-src/resources/js/components/ rocket/components/
          rsync -a \
            .rocket-src/resources/scss/ rocket/assets/styles/

      - name: Converter URLs sandbox -> producao (em memoria, sem commit)
        if: ${{ inputs.environment == 'production' }}
        run: |
          EXCL='--exclude=*.yml --exclude=*.sh --exclude-dir=.git --exclude-dir=.github --exclude-dir=.rocket-src --exclude-dir=node_modules'
          grep -rl $EXCL 'yampi-templates-sandbox' .      | xargs -r sed -i 's/yampi-templates-sandbox/yampi-templates-main/g'
          grep -rl $EXCL 'codigo-aberto-sandbox-assets' . | xargs -r sed -i 's/codigo-aberto-sandbox-assets/openstore-production-assets/g'
          grep -rl $EXCL 'images-dev.yampi' .             | xargs -r sed -i 's/images-dev.yampi/images.yampi/g'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Deploy para o S3
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            PREFIX="yampi-templates-main"
          else
            PREFIX="yampi-templates-sandbox"
          fi
          aws s3 sync ./ "s3://${{ secrets.AWS_BUCKET }}/$PREFIX" \
            --delete \
            --exclude ".github/*" \
            --exclude ".git/*" \
            --exclude ".rocket-src/*"
            --exclude ".gitignore"
